all:
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
    admin_ips:
      - {YOUR_IP}

  children:
    kube_control_plane:
      hosts:
        node1:
          ansible_host: {IP1}
          ip: {IP1}
          etcd_member_name: etcd1
        node2:
          ansible_host: {IP2}
          ip: {IP2}
          etcd_member_name: etcd2
        node3:
          ansible_host: {IP3}
          ip: {IP3}
          etcd_member_name: etcd3

    etcd:
      children:
        kube_control_plane:

    kube_node:
      hosts:
        node4:
          ansible_host: {IP4}
          ip: {IP4}
        node5:
          ansible_host: {IP5}
          ip: {IP5}
